{% load static %}
<header class="title">
    <div class="container__img">
        <img src="{% static 'img/INACAP.jpg' %}" alt="INACAP" />
    </div>

    <h1>MAPA TERRITORIAL DE ÑUBLE</h1>

    <form method="post" action="{% url 'logout' %}" class="logout-form">
        {% csrf_token %}
        <button type="submit" class="logout-btn">
            <img src="{% static 'img/vcm.png' %}" alt="Cerrar sesión" class="logout-img" />
        </button>
    </form>
</header>
